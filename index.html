<script type="module">

import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyD2lIT-OiTVZ-3N8RBUnLKLRl102WtBb78",authDomain:"elektrik-toptan-crm.firebaseapp.com",projectId:"elektrik-toptan-crm",storageBucket:"elektrik-toptan-crm.firebasestorage.app",messagingSenderId:"10597288130",appId:"1:10597288130:web:30e1ea99507628584e135b"};

window.dispatchEvent(new Event('firebaseReady'));

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0B1220;--bg2:#111B27;--bg3:#1F2937;
  --card:#111B27;--card2:#1F2937;--border:#263041;
  --blue:#3B82F6;--blue2:#60A5FA;--green:#10B981;
  --orange:#F59E0B;--red:#EF4444;--cyan:#06B6D4;--purple:#8B5CF6;
  --text:#F8FAFC;--text2:#94A3B8;--text3:#64748B;
}
html{font-size:14px;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
/* 1. Rakam hizalama - tabular-nums */
.n{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";font-weight:700;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:#263041;border-radius:10px;}

/* LAYOUT */
#root{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
#sb{width:220px;min-width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:relative;z-index:40;transition:transform .3s cubic-bezier(.4,0,.2,1);}
#sb::after{content:'';position:absolute;right:0;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,rgba(59,130,246,.45),transparent);}
.sbl{display:flex;align-items:center;gap:10px;padding:16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sbli{width:32px;height:32px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,#1d4ed8,#3b82f6,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 12px rgba(59,130,246,.4);}
.sbln{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--text);line-height:1.15;}
.sbls{font-size:10px;color:var(--blue2);margin-top:1px;}
#sbn{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;}
.sbg{font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text3);padding:10px 10px 4px;}
.sbi{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:transparent;width:100%;font-family:'DM Sans',sans-serif;transition:all .15s;margin-bottom:1px;position:relative;min-height:44px;text-align:left;}
.sbi:hover{background:rgba(59,130,246,.08);color:var(--text);}
.sbi.on{background:rgba(59,130,246,.14);color:var(--blue2);box-shadow:inset 0 0 0 1px rgba(59,130,246,.22);}
.sbi.on::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:3px;border-radius:2px;background:var(--blue);box-shadow:0 0 8px rgba(59,130,246,.7);}
.sbic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:background .15s;}
.sbi.on .sbic{background:rgba(59,130,246,.18);}
.vbdg{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;box-shadow:0 0 8px rgba(239,68,68,.5);display:none;}
.sbhr{border:none;border-top:1px solid var(--border);margin:5px 0;}
.sbf{padding:12px;border-top:1px solid var(--border);flex-shrink:0;}
.sbcol{display:flex;align-items:center;gap:8px;justify-content:center;width:100%;padding:7px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--text3);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;margin-bottom:8px;}
.sbcol:hover{border-color:rgba(59,130,246,.4);color:var(--blue2);background:rgba(59,130,246,.06);}
.sbu{display:flex;align-items:center;gap:10px;}
.sbav{width:32px;height:32px;border-radius:9px;flex-shrink:0;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;box-shadow:0 0 10px rgba(59,130,246,.3);}
.sbun{font-size:13px;font-weight:600;color:var(--text);}
.sbur{font-size:11px;color:var(--text3);}
.sblg{margin-left:auto;background:transparent;border:none;color:var(--text3);cursor:pointer;padding:5px;border-radius:7px;font-size:16px;transition:all .15s;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center;}
.sblg:hover{color:var(--red);background:rgba(239,68,68,.1);}

/* DRAWER OVERLAY */
#dov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:30;}
#dov.show{display:block;}

/* TOPBAR */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#tb{height:60px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;}
#hbg{display:none;background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:20px;min-width:44px;min-height:44px;align-items:center;justify-content:center;border-radius:8px;transition:all .15s;}
#hbg:hover{background:var(--bg3);color:var(--text);}
.tbt{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--text);}
.tbs{font-size:11px;color:var(--text3);margin-top:1px;}
.tbr{margin-left:auto;display:flex;align-items:center;gap:10px;}
.tbsrch{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:7px 14px;min-width:200px;}
.tbsrch input{background:transparent;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);width:100%;}
.tbsrch input::placeholder{color:var(--text3);}
.tbn{width:38px;height:38px;border-radius:9px;position:relative;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:17px;transition:all .15s;}
.tbn:hover{border-color:rgba(59,130,246,.4);color:var(--blue2);}
.ndot{position:absolute;top:7px;right:7px;width:8px;height:8px;background:var(--red);border-radius:50%;box-shadow:0 0 6px rgba(239,68,68,.7);display:none;}

/* CONTENT */
#cnt{flex:1;overflow-y:auto;padding:20px;background:var(--bg);}
.pw{width:100%;}

/* STAT GRID — grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-4 */
.sg{display:grid;gap:12px;margin-bottom:20px;}
.sg2{grid-template-columns:repeat(2,1fr);}
.sg3{grid-template-columns:repeat(3,1fr);}
.sg4{grid-template-columns:repeat(4,1fr);}
.sg5{grid-template-columns:repeat(5,1fr);}
.sg6{grid-template-columns:repeat(6,1fr);}

/* 3. bg-gray-800/60 border border-gray-700 rounded-xl p-4 shadow-lg | min-h-[80px] */
.card{background:rgba(17,27,39,.97);border:1px solid var(--border);border-radius:12px;padding:16px 18px;min-height:80px;display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.3);transition:all .18s;}
.card:hover{border-color:rgba(59,130,246,.32);transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,130,246,.1);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue),transparent);opacity:0;transition:opacity .18s;}
.card:hover::before{opacity:1;}
.clbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
/* text-2xl font-bold tabular-nums */
.cval{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;margin-top:auto;}
.csub{font-size:11px;color:var(--text3);margin-top:3px;}
.cico{position:absolute;top:14px;right:14px;font-size:18px;opacity:.2;}

/* TABLE */
.tbl{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.tbl table{width:100%;border-collapse:collapse;}
.tbl th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap;}
.tbl td{padding:0 14px;font-size:13px;color:var(--text2);border-bottom:1px solid rgba(38,48,65,.5);height:52px;vertical-align:middle;}
.tbl tbody tr:last-child td{border-bottom:none;}
.tbl tbody tr{cursor:pointer;transition:background .12s;}
.tbl tbody tr:hover{background:var(--card2);}
.tbl tbody tr:hover td{color:var(--text);}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 20px;color:var(--text3);}
.eico{font-size:44px;opacity:.25;margin-bottom:12px;}
.etit{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:4px;}
.esub{font-size:12px;}

/* CHIP */
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap;}
.cg{background:rgba(16,185,129,.12);color:var(--green);}
.co{background:rgba(245,158,11,.12);color:var(--orange);}
.cr{background:rgba(239,68,68,.12);color:var(--red);}
.cb{background:rgba(59,130,246,.12);color:var(--blue2);}
.cp{background:rgba(139,92,246,.12);color:var(--purple);}
.cc{background:rgba(6,182,212,.12);color:var(--cyan);}

/* BUTTON */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .18s;min-height:40px;white-space:nowrap;line-height:1;}
.bp{background:var(--blue);color:#fff;}
.bp:hover{background:#2563eb;box-shadow:0 0 16px rgba(59,130,246,.35);}
.bg{background:transparent;color:var(--text2);border:1px solid var(--border);}
.bg:hover{background:var(--bg3);color:var(--text);}
.bd{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.bd:hover{background:rgba(239,68,68,.2);}
.bsm{padding:5px 11px;font-size:12px;min-height:34px;}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(5px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--bg2);border:1px solid rgba(59,130,246,.22);border-radius:16px;padding:24px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.5);animation:mi .2s ease;}
.mw{max-width:680px;}
@keyframes mi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.mhd{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.mx{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;line-height:1;padding:5px;border-radius:6px;transition:all .15s;min-width:34px;min-height:34px;display:flex;align-items:center;justify-content:center;}
.mx:hover{color:var(--text);background:var(--bg3);}

/* FORM */
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.fl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);}
.fc{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--text);outline:none;width:100%;transition:border-color .15s;min-height:44px;}
.fc:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.1);}
.fc option{background:var(--bg2);}
textarea.fc{resize:vertical;min-height:80px;}
.ff{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap;}

/* ALERT */
.alert{padding:10px 14px;border-radius:9px;font-size:13px;display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.aw{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:var(--orange);}
.ai{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);color:var(--blue2);}

/* TABS */
.ftabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.ftab{padding:9px 16px;font-size:13px;font-weight:600;border:none;background:transparent;color:var(--text3);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:'DM Sans',sans-serif;min-height:44px;display:flex;align-items:center;}
.ftab.on{color:var(--blue2);border-bottom-color:var(--blue);}
.ftab:hover:not(.on){color:var(--text);}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--text3);background:transparent;font-family:'DM Sans',sans-serif;transition:all .15s;min-height:36px;display:flex;align-items:center;}
.pill.on{background:rgba(59,130,246,.14);color:var(--blue2);border-color:rgba(59,130,246,.32);}
.pill:hover:not(.on){background:var(--card2);color:var(--text);}

/* SECTION HEAD */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.sht{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}

/* BAR CHART */
.bc{display:flex;flex-direction:column;gap:9px;}
.bcr{display:flex;align-items:center;gap:10px;}
.bcl{font-size:12px;color:var(--text2);width:95px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.bct{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.bcf{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width .5s;}
.bcfp{background:linear-gradient(90deg,var(--purple),var(--blue2));}
.bcfg{background:linear-gradient(90deg,var(--green),var(--cyan));}
.bcv{font-size:11px;color:var(--text3);width:80px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums;}

/* MAP */
.mpo{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.mph{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.mpt{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.mpl{display:flex;gap:12px;flex-wrap:wrap;}
.mli{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
.mld{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
/* h-64 md:h-80 lg:h-[480px] */
.mpsw{position:relative;height:480px;overflow:hidden;background:linear-gradient(160deg,#050b18,#091422 60%,#050b18);padding:8px 6px 4px;}
.mpsvg{width:100%;height:100%;display:block;}
.prov{stroke:#1a3356;stroke-width:.5;cursor:pointer;fill:#0e1d30;transition:fill .15s,stroke .15s;}
.prov:hover{fill:#1d4b7a;stroke:var(--blue);stroke-width:1;filter:drop-shadow(0 0 5px rgba(59,130,246,.5));}
.prov.pg{fill:rgba(16,185,129,.22);stroke:rgba(16,185,129,.4);}
.prov.pg:hover{fill:rgba(16,185,129,.42);stroke:var(--green);}
.prov.po{fill:rgba(245,158,11,.2);stroke:rgba(245,158,11,.38);}
.prov.po:hover{fill:rgba(245,158,11,.4);stroke:var(--orange);}
.prov.pr{fill:rgba(239,68,68,.18);stroke:rgba(239,68,68,.33);}
.prov.pr:hover{fill:rgba(239,68,68,.36);stroke:var(--red);}
.prov.sel{fill:#1a5da8!important;stroke:#60a5fa!important;stroke-width:1.5!important;filter:drop-shadow(0 0 8px rgba(96,165,250,.7))!important;}
.plbl{font-size:6.5px;fill:rgba(148,163,184,.5);pointer-events:none;font-family:'DM Sans',sans-serif;font-weight:600;text-anchor:middle;dominant-baseline:middle;}
.plbl.sel{fill:rgba(255,255,255,.9);}
.mptip{position:absolute;background:rgba(8,12,20,.97);border:1px solid rgba(59,130,246,.35);border-radius:10px;padding:10px 14px;pointer-events:none;font-size:12px;z-index:50;min-width:175px;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.mptip.show{display:block;}
.tpn{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:var(--blue2);margin-bottom:5px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.tpr{color:var(--text3);display:flex;justify-content:space-between;gap:12px;margin-top:3px;font-size:11.5px;}
.tpv{color:var(--text);font-weight:700;font-variant-numeric:tabular-nums;}
.mpd{border-top:1px solid var(--border);padding:16px;animation:fu .2s;}

/* İL DETAY stat-row (görseldeki kart listesi) */
.ilsr{display:flex;gap:0;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;overflow-x:auto;}
.ilsi{flex:1;min-width:110px;padding:14px 16px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:3px;}
.ilsi:last-child{border-right:none;}
.ilsico{font-size:18px;margin-bottom:4px;}
.ilsl{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);}
.ilsv{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;}
.ilss{font-size:11px;color:var(--text3);}

/* LOGIN */
#lisc{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 30%,rgba(59,130,246,.08),var(--bg) 65%);}
.lic{background:var(--bg2);border:1px solid rgba(59,130,246,.18);border-radius:20px;padding:32px;width:100%;max-width:400px;box-shadow:0 0 60px rgba(59,130,246,.1);}
.lim{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--blue2);margin-bottom:8px;text-align:center;}
.lin{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--text);text-align:center;}
.lis{font-size:13px;color:var(--text3);text-align:center;margin-top:5px;margin-bottom:28px;}
.lie{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;}
.lie.on{display:block;}
.iw{position:relative;}
.ii{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none;}
.if{padding-left:36px!important;}
.libtn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;margin-top:6px;min-height:48px;}
.libtn:hover{background:#2563eb;box-shadow:0 0 20px rgba(59,130,246,.35);}
.libtn:disabled{opacity:.6;cursor:not-allowed;}
.lift{text-align:center;color:var(--text3);font-size:11.5px;margin-top:20px;}

/* DASHBOARD */
.dtp{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.dmb{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.dmh{padding:11px 16px;border-bottom:1px solid var(--border);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text2);}
.dmg{display:grid;grid-template-columns:1fr 1fr;}
.dmi{padding:14px 16px;position:relative;border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .15s;}
.dmi:nth-child(2),.dmi:nth-child(4){border-right:none;}
.dmi:nth-child(3),.dmi:nth-child(4){border-bottom:none;}
.dmi:hover{background:var(--card2);}
.dmico{position:absolute;top:12px;right:12px;font-size:16px;opacity:.18;}
.dml{font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.dmv{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;}
.dms{font-size:10.5px;color:var(--text3);margin-top:3px;}
.fstk{display:flex;flex-direction:column;gap:9px;}
.fcard{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 14px;display:flex;align-items:center;gap:12px;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.fcard:hover{border-color:rgba(59,130,246,.3);}
.fico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.fl2{font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:1px;}
.fv{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;}

/* UTILS */
.hidden{display:none!important;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.mb12{margin-bottom:12px;}
.mb16{margin-bottom:16px;}
.mb20{margin-bottom:20px;}
.ldf{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:var(--text3);}
.spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fab{position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(59,130,246,.5);display:none;align-items:center;justify-content:center;z-index:20;transition:all .2s;}
.fab:hover{background:#2563eb;transform:scale(1.05);}

/* RESPONSIVE */
@media(max-width:1024px){.sg6{grid-template-columns:repeat(3,1fr);}.sg5{grid-template-columns:repeat(3,1fr);}}
@media(max-width:900px){
  #hbg{display:flex!important;}
  #sb{position:fixed;top:0;left:0;bottom:0;z-index:40;transform:translateX(-100%);box-shadow:4px 0 32px rgba(0,0,0,.6);width:220px!important;min-width:220px!important;}
  #sb.open{transform:translateX(0);}
  .tbsrch{min-width:unset;flex:1;}
  .dtp{grid-template-columns:1fr;}
  .sg6,.sg5,.sg4{grid-template-columns:repeat(2,1fr);}
  .sg3{grid-template-columns:repeat(2,1fr);}
  .sg2,.g2{grid-template-columns:1fr;}
  .fr{grid-template-columns:1fr;}
  /* md:h-80 */
  .mpsw{height:320px;}
}
@media(max-width:600px){
  #cnt{padding:12px;}
  #tb{padding:0 12px;gap:8px;}
  .tbsrch{display:none;}
  .sg6,.sg5,.sg4,.sg3{grid-template-columns:repeat(2,1fr);}
  /* h-64 */
  .mpsw{height:256px;}
  .dmv{font-size:18px;}
  .cval{font-size:18px;}
  .fv{font-size:14px;}
  .modal{padding:18px;}
  .tbl td{height:56px;}
  .fab{display:flex;}
}

<script>
const ST={page:'dashboard',srch:'',customers:[],sales:[],payments:[],expenses:[],incomes:[],banks:[],unsubs:[],mapS:null,tab:{},flt:{},sbc:false};
const PM={dashboard:['Dashboard','Genel bakış ve özet'],harita:['Müşteri Haritası','81 il interaktif harita'],musteriler:['Müşteriler','Müşteri listesi'],satislar:['Satışlar','Satış kayıtları'],cari:['Cari Hesap','Bakiye ve hareketler'],tahsilat:['Tahsilat','Tahsilat takibi'],finans:['Finans','Kasa, banka, giderler'],raporlar:['Raporlar','Raporlar ve analiz']};
const P=n=>new Intl.NumberFormat('tr-TR',{style:'currency',currency:'TRY',maximumFractionDigits:0}).format(n||0);
const N=n=>new Intl.NumberFormat('tr-TR').format(n||0);
const D=d=>d?new Date(d).toLocaleDateString('tr-TR'):'—';
const TD=()=>new Date().toISOString().split('T')[0];
const E=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const $=id=>document.getElementById(id);
function chip(l,c='cb'){return`<span class="chip ${c}">${E(l)}</span>`;}
function durC(d){return chip(d,{aktif:'cg',pasif:'co',yeni:'cb',riskli:'cr'}[d]||'cb');}
function sDot(c){const s=cSt(c);const col=s==='green'?'var(--green)':s==='orange'?'var(--orange)':'var(--red)';const l=s==='green'?'Son 30 gün':s==='orange'?'30+ gün':'Sipariş yok';return`<span style="display:inline-flex;align-items:center;gap:5px;font-size:12px"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${col};flex-shrink:0"></span>${l}</span>`;}
function cSt(c){const cs=ST.sales.filter(s=>s.musteriId===c.id);if(!cs.length)return 'red';const last=cs.reduce((a,b)=>a.tarih>b.tarih?a:b);return(Date.now()-new Date(last.tarih))/86400000<=30?'green':'orange';}
function vakL(){const lim=new Date(Date.now()+7*86400000);return ST.sales.filter(s=>!s.tahsil&&s.vade&&new Date(s.vade)<lim);}
const IL=['Adana','Adıyaman','Afyonkarahisar','Ağrı','Aksaray','Amasya','Ankara','Antalya','Ardahan','Artvin','Aydın','Balıkesir','Bartın','Batman','Bayburt','Bilecik','Bingöl','Bitlis','Bolu','Burdur','Bursa','Çanakkale','Çankırı','Çorum','Denizli','Diyarbakır','Düzce','Edirne','Elazığ','Erzincan','Erzurum','Eskişehir','Gaziantep','Giresun','Gümüşhane','Hakkari','Hatay','Iğdır','Isparta','İstanbul','İzmir','K.Maraş','Karabük','Karaman','Kars','Kastamonu','Kayseri','Kilis','Kırıkkale','Kırklareli','Kırşehir','Kocaeli','Konya','Kütahya','Malatya','Manisa','Mardin','Mersin','Muğla','Muş','Nevşehir','Niğde','Ordu','Osmaniye','Rize','Sakarya','Samsun','Siirt','Sinop','Sivas','Şanlıurfa','Şırnak','Tekirdağ','Tokat','Trabzon','Tunceli','Uşak','Van','Yalova','Yozgat','Zonguldak'];

window.addEventListener('firebaseReady',()=>{
  window._fns.onAuthStateChanged(window._auth,user=>{
    $('ldsc').classList.add('hidden');
    if(user){$('lisc').classList.add('hidden');$('root').classList.remove('hidden');startLS();go('dashboard');}
    else{$('root').classList.add('hidden');$('lisc').classList.remove('hidden');ST.unsubs.forEach(u=>u());ST.unsubs=[];}
  });
});
async function doLogin(){
  const em=$('liem').value.trim(),pw=$('lipw').value;
  const btn=$('libtn'),err=$('lierr');
  if(!em||!pw){err.textContent='E-posta ve şifre gerekli.';err.classList.add('on');return;}
  btn.disabled=true;btn.textContent='Giriş yapılıyor...';err.classList.remove('on');
  try{await window._fns.signInWithEmailAndPassword(window._auth,em,pw);}
  catch(e){err.textContent='E-posta veya şifre hatalı.';err.classList.add('on');btn.disabled=false;btn.textContent='Giriş Yap';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!$('lisc').classList.contains('hidden'))doLogin();});
async function doLogout(){if(confirm('Çıkış yapmak istiyor musunuz?'))await window._fns.signOut(window._auth);}

function startLS(){
  const{collection,query,orderBy,onSnapshot}=window._fns,db=window._db;
  ST.unsubs.forEach(u=>u());ST.unsubs=[];
  [['customers','firma'],['sales','tarih'],['payments','tarih'],['expenses','tarih'],['incomes','tarih'],['banks','ad']].forEach(([col,ord])=>{
    ST.unsubs.push(onSnapshot(query(collection(db,col),orderBy(ord,'desc')),snap=>{ST[col]=snap.docs.map(d=>({id:d.id,...d.data()}));reP();updV();}));
  });
}
async function fsA(col,d){const{addDoc,collection,serverTimestamp:ts}=window._fns;return addDoc(collection(window._db,col),{...d,createdAt:ts(),updatedAt:ts()});}
async function fsU(col,id,d){const{updateDoc,doc,serverTimestamp:ts}=window._fns;return updateDoc(doc(window._db,col,id),{...d,updatedAt:ts()});}
async function fsD(col,id){const{deleteDoc,doc}=window._fns;return deleteDoc(doc(window._db,col,id));}

function go(p){ST.page=p;document.querySelectorAll('.sbi').forEach(e=>e.classList.remove('on'));$('nav-'+p)?.classList.add('on');document.querySelectorAll('.pw').forEach(e=>e.classList.add('hidden'));$('pg-'+p)?.classList.remove('hidden');const[t,s]=PM[p]||[p,''];$('pgt').textContent=t;$('pgs').textContent=s;$('srch').value='';ST.srch='';cSB();reP(p);}
function reP(p){p=p||ST.page;const el=$('pg-'+p);if(!el||el.classList.contains('hidden'))return;({dashboard:rDash,harita:rHar,musteriler:rMus,satislar:rSat,cari:rCar,tahsilat:rTah,finans:rFin,raporlar:rRap}[p]||function(){})(el);}
function oSrch(v){ST.srch=v.toLowerCase();reP();}
function sFlt(p,v){ST.flt[p]=v;reP(p);}
function sTab(p,v){ST.tab[p]=v;reP(p);}
function updV(){const v=vakL(),b=$('vbdg'),d=$('ndot');if(v.length){b.textContent=v.length;b.style.display='';d.style.display='block';}else{b.style.display='none';d.style.display='none';}}
function oSB(){$('sb').classList.add('open');$('dov').classList.add('show');}
function cSB(){$('sb').classList.remove('open');$('dov').classList.remove('show');}
function tSB(){
  ST.sbc=!ST.sbc;const sb=$('sb');
  if(ST.sbc){sb.style.cssText='width:68px;min-width:68px;';sb.querySelectorAll('.sbln,.sbls,.sbg,#sbn span,.sbun,.sbur,.sblg,.vbdg').forEach(e=>e.style.display='none');sb.querySelectorAll('.sbi').forEach(e=>{e.style.justifyContent='center';e.style.padding='10px 0';});$('scl').textContent='→';}
  else{sb.style.cssText='width:220px;min-width:220px;';sb.querySelectorAll('.sbln,.sbls,.sbg,#sbn span,.sbun,.sbur,.sblg,.vbdg').forEach(e=>e.style.display='');sb.querySelectorAll('.sbi').forEach(e=>{e.style.justifyContent='';e.style.padding='';});$('scl').textContent='Daralt';}
}
function fabC(){({dashboard:()=>go('satislar'),musteriler:openMF,satislar:openSF,tahsilat:openTF,finans:openGF,cari:()=>go('tahsilat')}[ST.page]||openSF)();}

function rDash(el){
  const C=ST.customers,S=ST.sales,Py=ST.payments,B=ST.banks,I=ST.incomes,Ex=ST.expenses;
  const tS=S.reduce((a,b)=>a+(b.tutar||0),0),tP=Py.reduce((a,b)=>a+(b.tutar||0),0);
  const tA=S.filter(s=>!s.tahsil).reduce((a,b)=>a+(b.tutar||0),0),tB=B.reduce((a,b)=>a+(b.bakiye||0),0);
  const tG=tP+I.reduce((a,b)=>a+(b.tutar||0),0),tD=Ex.reduce((a,b)=>a+(b.tutar||0),0),net=tG-tD;
  const ak=C.filter(c=>c.durum==='aktif').length,ps=C.filter(c=>c.durum==='pasif').length,rs=C.filter(c=>c.durum==='riskli'||c.durum==='yeni').length;
  const vakl=vakL();
  const rS=[...S].sort((a,b)=>(b.tarih||'').localeCompare(a.tarih||'')).slice(0,6);
  const rP=[...Py].sort((a,b)=>(b.tarih||'').localeCompare(a.tarih||'')).slice(0,5);
  const ilS={};S.forEach(s=>{const c=C.find(x=>x.id===s.musteriId);if(c?.il)ilS[c.il]=(ilS[c.il]||0)+(s.tutar||0);});
  const tpI=Object.entries(ilS).sort((a,b)=>b[1]-a[1]).slice(0,10),mxI=tpI[0]?.[1]||1;
  const mS={};S.forEach(s=>{mS[s.musteria||'']=(mS[s.musteria||'']||0)+(s.tutar||0);});
  const tpM=Object.entries(mS).sort((a,b)=>b[1]-a[1]).slice(0,10),mxM=tpM[0]?.[1]||1;
  const vA=vakl.length?`<div class="alert aw mb16">⚠️ <strong>${vakl.length}</strong> adet vadesi yaklaşan tahsilat! <button class="btn bg bsm" style="margin-left:auto" onclick="go('tahsilat')">Görüntüle →</button></div>`:'';
  const sR=rS.map(s=>`<tr onclick="go('satislar')"><td><div style="font-weight:600;color:var(--text)">${E(s.musteria)}</div><div style="font-size:11px;color:var(--text3)">${D(s.tarih)}</div></td><td class="n" style="color:var(--blue2)">${P(s.tutar)}</td><td>${chip(s.tahsil?'Tahsil':'Bekliyor',s.tahsil?'cg':'co')}</td></tr>`).join('');
  const pR=rP.map(p=>`<tr onclick="go('tahsilat')"><td><div style="font-weight:600;color:var(--text)">${E(p.musteria)}</div><div style="font-size:11px;color:var(--text3)">${D(p.tarih)}</div></td><td class="n" style="color:var(--green)">${P(p.tutar)}</td><td>${chip(p.yontem,'cb')}</td></tr>`).join('');
  const iB=tpI.map(([il,t])=>`<div class="bcr"><div class="bcl">${E(il)}</div><div class="bct"><div class="bcf" style="width:${Math.round(t/mxI*100)}%"></div></div><div class="bcv">${P(t)}</div></div>`).join('');
  const mB=tpM.map(([m,t])=>`<div class="bcr"><div class="bcl">${E(m)}</div><div class="bct"><div class="bcf bcfp" style="width:${Math.round(t/mxM*100)}%"></div></div><div class="bcv">${P(t)}</div></div>`).join('');
  el.innerHTML=`${vA}
<div class="dtp">
  <div class="dmb"><div class="dmh">👥 Müşteri Durumu</div><div class="dmg">
    <div class="dmi"><div class="dmico">👥</div><div class="dml">Toplam</div><div class="dmv" style="color:var(--blue2)">${N(C.length)}</div><div class="dms">kayıtlı firma</div></div>
    <div class="dmi"><div class="dmico">✅</div><div class="dml">Aktif</div><div class="dmv" style="color:var(--green)">${N(ak)}</div><div class="dms">son 30 gün</div></div>
    <div class="dmi"><div class="dmico">⏸️</div><div class="dml">Pasif</div><div class="dmv" style="color:var(--orange)">${N(ps)}</div><div class="dms">sipariş yok</div></div>
    <div class="dmi"><div class="dmico">⚠️</div><div class="dml">Riskli</div><div class="dmv" style="color:var(--red)">${N(rs)}</div><div class="dms">takip gerekli</div></div>
  </div></div>
  <div class="fstk">
    <div class="fcard"><div class="fico" style="background:rgba(59,130,246,.1)">🛒</div><div><div class="fl2">Toplam Satış</div><div class="fv n" style="color:var(--blue2)">${P(tS)}</div></div></div>
    <div class="fcard"><div class="fico" style="background:rgba(16,185,129,.1)">💰</div><div><div class="fl2">Toplam Tahsilat</div><div class="fv n" style="color:var(--green)">${P(tP)}</div></div></div>
    <div class="fcard"><div class="fico" style="background:rgba(245,158,11,.1)">📋</div><div><div class="fl2">Cari Alacak</div><div class="fv n" style="color:var(--orange)">${P(tA)}</div></div></div>
    <div class="fcard"><div class="fico" style="background:rgba(6,182,212,.1)">🏦</div><div><div class="fl2">Banka Toplam</div><div class="fv n" style="color:var(--cyan)">${P(tB)}</div></div></div>
    <div class="fcard"><div class="fico" style="background:${net>0?'rgba(16,185,129,.1)':'rgba(239,68,68,.1)'}">📊</div><div><div class="fl2">Net Bakiye</div><div class="fv n" style="color:${net>0?'var(--green)':'var(--red)'}">${P(net)}</div></div></div>
  </div>
</div>
<div class="g2 mb20">
  <div><div class="sh"><div class="sht">Son Satışlar</div><button class="btn bg bsm" onclick="go('satislar')">Tümü →</button></div>
  <div class="tbl"><table><thead><tr><th>Müşteri</th><th>Tutar</th><th>Durum</th></tr></thead><tbody>${sR||'<tr><td colspan="3"><div class="empty"><div class="eico">🛒</div><div class="etit">Henüz satış yok</div></div></td></tr>'}</tbody></table></div></div>
  <div><div class="sh"><div class="sht">Son Tahsilatlar</div><button class="btn bg bsm" onclick="go('tahsilat')">Tümü →</button></div>
  <div class="tbl"><table><thead><tr><th>Müşteri</th><th>Tutar</th><th>Yöntem</th></tr></thead><tbody>${pR||'<tr><td colspan="3"><div class="empty"><div class="eico">💰</div><div class="etit">Henüz tahsilat yok</div></div></td></tr>'}</tbody></table></div></div>

function rRap(el){const tab=ST.tab.raporlar||'il';const tabs=`<div class="ftabs">${[['il','🗺️ İl Bazlı'],['musteri','👥 Müşteri'],['aylik','📅 Aylık'],['tahsilat','💰 Tahsilat'],['cari','📒 Cari']].map(([v,l])=>`<button class="ftab${tab===v?' on':''}" onclick="sTab('raporlar','${v}')">${l}</button>`).join('')}</div>`;
let body='';
if(tab==='il'){const ir={};ST.sales.forEach(s=>{const c=ST.customers.find(x=>x.id===s.musteriId);if(c?.il){if(!ir[c.il])ir[c.il]={il:c.il,satis:0,tahsilat:0,musteri:new Set(),siparis:0};ir[c.il].satis+=s.tutar||0;ir[c.il].musteri.add(c.id);ir[c.il].siparis++;}});ST.payments.forEach(p=>{const c=ST.customers.find(x=>x.id===p.musteriId);if(c?.il&&ir[c.il])ir[c.il].tahsilat+=p.tutar||0;});const rows=Object.values(ir).map(r=>({...r,musteri:r.musteri.size})).sort((a,b)=>b.satis-a.satis);const mxI=rows[0]?.satis||1;const bars=rows.slice(0,10).map(r=>`<div class="bcr"><div class="bcl">${E(r.il)}</div><div class="bct"><div class="bcf" style="width:${Math.round(r.satis/mxI*100)}%"></div></div><div class="bcv">${P(r.satis)}</div></div>`).join('');const tR=rows.map(r=>`<tr><td style="font-weight:600;color:var(--text)">${E(r.il)}</td><td>${N(r.musteri)}</td><td>${N(r.siparis)}</td><td class="n" style="color:var(--blue2)">${P(r.satis)}</td><td class="n" style="color:var(--green)">${P(r.tahsilat)}</td><td class="n" style="color:var(--orange)">${P(r.satis-r.tahsilat)}</td></tr>`).join('');body=`<div class="card mb16"><div class="sht mb12">İl Bazlı Satış Grafiği</div><div class="bc">${bars||'<div style="color:var(--text3);text-align:center;padding:24px">Veri yok</div>'}</div></div><div class="tbl"><table><thead><tr><th>İl</th><th>Müşteri</th><th>Sipariş</th><th>Toplam Satış</th><th>Tahsilat</th><th>Bakiye</th></tr></thead><tbody>${tR||'<tr><td colspan="6"><div class="empty etit">Veri yok</div></td></tr>'}</tbody></table></div>`;}
else if(tab==='musteri'){const rows=ST.customers.map(c=>{const cs=ST.sales.filter(s=>s.musteriId===c.id),cp=ST.payments.filter(p=>p.musteriId===c.id);const st=cs.reduce((a,b)=>a+(b.tutar||0),0),pt=cp.reduce((a,b)=>a+(b.tutar||0),0);return{firma:c.firma,il:c.il,durum:c.durum,satis:st,tahsilat:pt,bakiye:st-pt,siparis:cs.length};}).sort((a,b)=>b.satis-a.satis);const tR=rows.map(r=>`<tr><td style="font-weight:600;color:var(--text)">${E(r.firma)}</td><td>${E(r.il)}</td><td>${durC(r.durum)}</td><td>${N(r.siparis)}</td><td class="n" style="color:var(--blue2)">${P(r.satis)}</td><td class="n" style="color:var(--green)">${P(r.tahsilat)}</td><td class="n" style="color:${r.bakiye>0?'var(--orange)':'var(--green)'}">${P(r.bakiye)}</td></tr>`).join('');body=`<div class="tbl"><table><thead><tr><th>Firma</th><th>İl</th><th>Durum</th><th>Sipariş</th><th>Toplam Satış</th><th>Tahsilat</th><th>Bakiye</th></tr></thead><tbody>${tR||'<tr><td colspan="7"><div class="empty etit">Veri yok</div></td></tr>'}</tbody></table></div>`;}
else if(tab==='aylik'){const ar={};ST.sales.forEach(s=>{if(!s.tarih)return;const ay=s.tarih.substring(0,7);if(!ar[ay])ar[ay]={ay,satis:0,tahsilat:0,siparis:0};ar[ay].satis+=s.tutar||0;ar[ay].siparis++;});ST.payments.forEach(p=>{if(!p.tarih)return;const ay=p.tarih.substring(0,7);if(ar[ay])ar[ay].tahsilat+=p.tutar||0;});const rows=Object.values(ar).sort((a,b)=>b.ay.localeCompare(a.ay));const mxA=rows[0]?.satis||1;const bars=rows.slice(0,12).map(r=>`<div class="bcr"><div class="bcl">${r.ay}</div><div class="bct"><div class="bcf bcfg" style="width:${Math.round(r.satis/mxA*100)}%"></div></div><div class="bcv">${P(r.satis)}</div></div>`).join('');const tR=rows.map(r=>`<tr><td style="color:var(--text)">${r.ay}</td><td>${N(r.siparis)}</td><td class="n" style="color:var(--blue2)">${P(r.satis)}</td><td class="n" style="color:var(--green)">${P(r.tahsilat)}</td><td class="n" style="color:${r.satis-r.tahsilat>0?'var(--orange)':'var(--green)'}">${P(r.satis-r.tahsilat)}</td></tr>`).join('');body=`<div class="card mb16"><div class="sht mb12">Aylık Satış Grafiği</div><div class="bc">${bars||'<div style="color:var(--text3);text-align:center;padding:24px">Veri yok</div>'}</div></div><div class="tbl"><table><thead><tr><th>Ay</th><th>Sipariş</th><th>Satış</th><th>Tahsilat</th><th>Fark</th></tr></thead><tbody>${tR||'<tr><td colspan="5"><div class="empty etit">Veri yok</div></td></tr>'}</tbody></table></div>`;}
else if(tab==='tahsilat'){const tR=[...ST.payments].sort((a,b)=>(b.tarih||'').localeCompare(a.tarih||'')).map(p=>`<tr><td>${D(p.tarih)}</td><td style="font-weight:600;color:var(--text)">${E(p.musteria)}</td><td class="n" style="color:var(--green)">${P(p.tutar)}</td><td>${chip(p.yontem,'cb')}</td><td style="color:var(--text3)">${E(p.aciklama)}</td></tr>`).join('');body=`<div class="tbl"><table><thead><tr><th>Tarih</th><th>Müşteri</th><th>Tutar</th><th>Yöntem</th><th>Açıklama</th></tr></thead><tbody>${tR||'<tr><td colspan="5"><div class="empty etit">Tahsilat yok</div></td></tr>'}</tbody></table></div>`;}
else{const rows=ST.customers.map(c=>{const st=ST.sales.filter(s=>s.musteriId===c.id).reduce((a,b)=>a+(b.tutar||0),0),pt=ST.payments.filter(p=>p.musteriId===c.id).reduce((a,b)=>a+(b.tutar||0),0);return{firma:c.firma,il:c.il,satis:st,tahsilat:pt,bakiye:st-pt};}).sort((a,b)=>b.bakiye-a.bakiye);const tR=rows.map(r=>`<tr><td style="font-weight:600;color:var(--text)">${E(r.firma)}</td><td>${E(r.il)}</td><td class="n" style="color:var(--blue2)">${P(r.satis)}</td><td class="n" style="color:var(--green)">${P(r.tahsilat)}</td><td class="n" style="color:${r.bakiye>0?'var(--orange)':r.bakiye<0?'var(--green)':'var(--text2)'}">${P(r.bakiye)}</td></tr>`).join('');body=`<div class="tbl"><table><thead><tr><th>Firma</th><th>İl</th><th>Toplam Satış</th><th>Tahsilat</th><th>Bakiye</th></tr></thead><tbody>${tR||'<tr><td colspan="5"><div class="empty etit">Veri yok</div></td></tr>'}</tbody></table></div>`;}
el.innerHTML=tabs+body;}

function openM(t,cls,body){$('mtit').textContent=t;$('mbd').innerHTML=body;$('mbox').className='modal'+(cls?' '+cls:'');$('mov').classList.remove('hidden');}
function cMov(e){if(e.target===$('mov'))cM();}
function cM(){$('mov').classList.add('hidden');}
</script>
</body>
</html>
